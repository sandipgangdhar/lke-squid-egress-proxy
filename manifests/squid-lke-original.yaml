apiVersion: v1
kind: Namespace
metadata:
  name: squid-proxy
  labels:
    app.kubernetes.io/name: squid-proxy

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-config
  namespace: squid-proxy
data:
  squid.conf: |
    http_port 3128

    http_access deny manager

    acl kubernetes_networks src 10.0.0.0/8
    acl kubernetes_networks src 172.16.0.0/12
    acl kubernetes_networks src 192.168.0.0/16

    acl SSL_ports port 443
    acl Safe_ports port 80
    acl Safe_ports port 443
    acl Safe_ports port 1025-65535
    acl CONNECT method CONNECT

    http_access deny !Safe_ports
    http_access deny CONNECT !SSL_ports

    http_access allow kubernetes_networks
    http_access deny all

    cache deny all
    cache_mem 64 MB
    maximum_object_size 0 KB

    forwarded_for delete

    access_log stdio:/var/log/squid/access.log
    cache_log /var/log/squid/cache.log
    cache_store_log none

    shutdown_lifetime 5 seconds
    request_timeout 2 minutes
    connect_timeout 30 seconds
    read_timeout 5 minutes

    max_filedescriptors 65535

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: squid
  namespace: squid-proxy
automountServiceAccountToken: false

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: squid
  namespace: squid-proxy
  labels:
    app.kubernetes.io/name: squid
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

  selector:
    matchLabels:
      app.kubernetes.io/name: squid

  template:
    metadata:
      labels:
        app.kubernetes.io/name: squid
    spec:
      serviceAccountName: squid

      tolerations:
        - key: dedicated
          operator: Equal
          value: squid-egress
          effect: NoSchedule

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload
                    operator: In
                    values:
                      - squid-egress

        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: squid
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 13
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: squid
          image: ubuntu/squid:6.10-24.10_edge
          imagePullPolicy: IfNotPresent

          ports:
            - name: proxy
              containerPort: 3128
              protocol: TCP

          command:
            - /bin/sh
            - -ec
            - |
              rm -f /run/squid.pid
              squid -k parse -f /etc/squid/squid.conf
              exec squid -N -d 1 -f /etc/squid/squid.conf

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - squid -k shutdown || true; sleep 10

          volumeMounts:
            - name: squid-config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true

            - name: squid-cache
              mountPath: /var/spool/squid

            - name: squid-run
              mountPath: /run/squid

            - name: squid-logs
              mountPath: /var/log/squid

      volumes:
        - name: squid-config
          configMap:
            name: squid-config

        - name: squid-cache
          emptyDir: {}

        - name: squid-run
          emptyDir: {}

        - name: squid-logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: squid-proxy
  namespace: squid-proxy
  labels:
    app.kubernetes.io/name: squid
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: squid
  ports:
    - name: proxy
      port: 3128
      targetPort: proxy
      protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: squid
  namespace: squid-proxy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: squid
